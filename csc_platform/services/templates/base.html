<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ shop.name }} | Premium Services{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        /* Global Setup */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden;
        }

        /* --- VISUAL BOOST: Flagship Custom Scrollbars --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Utility to hide scrollbar but keep horizontal scrolling for the dates */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Smooth Math */
        :root {
            --smooth-curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Entrance Animations */
        @keyframes subtleFadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes ambientBreathe {
            0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            50% { transform: scale(1.1) translate(20px, -20px); opacity: 0.6; }
        }

        .animate-fade-up {
            opacity: 0; /* Start hidden */
            animation: subtleFadeUp 1.2s var(--smooth-curve) forwards;
        }

        /* --- VISUAL BOOST: Upgraded Glassmorphism Gradient --- */
        .glass-panel {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-500 selection:text-white relative min-h-screen flex flex-col">
    
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none bg-slate-50">
        <div class="absolute top-[-20%] left-[-10%] w-[700px] h-[700px] rounded-full bg-indigo-300/30 mix-blend-multiply filter blur-[120px]" style="animation: ambientBreathe 12s ease-in-out infinite;"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[800px] h-[800px] rounded-full bg-blue-300/30 mix-blend-multiply filter blur-[150px]" style="animation: ambientBreathe 15s ease-in-out infinite reverse;"></div>
        <div class="absolute top-[30%] left-[40%] w-[500px] h-[500px] rounded-full bg-purple-200/20 mix-blend-multiply filter blur-[100px]" style="animation: ambientBreathe 18s ease-in-out infinite;"></div>
    </div>

    <div class="flex-grow z-10 relative">
        {% block content %}{% endblock %}
    </div>
    
</body>
</html>
